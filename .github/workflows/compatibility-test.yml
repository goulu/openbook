name: WordPress Compatibility Test

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:

jobs:
  lint:
    name: PHP Syntax Check (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none

      - name: Syntax Lint
        run: |
          find . -name "*.php" ! -path "*/wp-content/*" -exec php -l {} \;

  test:
    name: Integration (WP ${{ matrix.wp-version }} / PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']
        wp-version: ['latest', 'nightly']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: wordpress
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: openbook4wordpress

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, curl, mbstring, dom, xml

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Install WordPress and Link Plugin
        run: |
          wp core download --version=${{ matrix.wp-version }} --path=wordpress
          wp config create --dbname=wordpress_test --dbuser=root --dbpass=wordpress --dbhost=127.0.0.1 --path=wordpress
          wp core install --url=http://127.0.0.1 --title="Test Site" --admin_user=admin --admin_password=password --admin_email=admin@example.com --path=wordpress
          ln -s ../../../openbook4wordpress wordpress/wp-content/plugins/openbook4wordpress

      - name: Activate and verify plugin
        run: |
          wp plugin activate openbook4wordpress --path=wordpress
          wp plugin is-active openbook4wordpress --path=wordpress
